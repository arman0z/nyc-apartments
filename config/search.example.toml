[criteria]
min_bedrooms = 2
max_price = 4500
areas = [
  "Manhattan",
  "Brooklyn",
  "Queens",
  "Long Island City",
]
# Fill this with the exact yes-list before the baseline scan. When non-empty,
# listings outside these neighborhoods are excluded.
neighborhoods = []
strict_location_sources = ["facebook"]
allowed_location_terms = [
  "New York, New York",
  "New York, NY",
  "Manhattan, New York",
  "Brooklyn, New York",
  "Brooklyn, NY",
  "Queens, New York",
  "Queens, NY",
  "Long Island City, New York",
  "Long Island City, NY",
  "Astoria, New York",
  "Sunnyside, New York",
  "Woodside, New York",
]
excluded_location_terms = [
  "Paterson",
  "Newark",
  "Deer Park",
  "Jersey City",
  "Hoboken",
]

[history]
missing_before_removed_runs = 2

[policy]
building_signals_path = "data/policy/building-signals.example.csv"
local_421a_bbls_path = "data/policy/421a-bbls.csv"

[enrichment]
geocode_nyc_addresses = true
tax_benefit_lookup = true
geocode_cache_path = "data/geocode-cache.json"
tax_benefit_cache_path = "data/tax-benefit-cache.json"

[[sources]]
name = "streeteasy"
type = "apify"
enabled = true
actor_id = "crawlerbros/streeteasy-scraper"
max_items = 25

[sources.input]
startUrls = [
  { url = "https://streeteasy.com/2-bedroom-apartments-for-rent/nyc/price:-4500" },
]
maxResults = 25
detailedMode = false

[[sources]]
name = "craigslist"
type = "apify"
enabled = false
actor_id = "ivanvs/craigslist-scraper-pay-per-result"
max_items = 25

[sources.input]
maxConcurrency = 1
maxAge = 1
proxyConfiguration = { useApifyProxy = true }
urls = [
  { url = "https://newyork.craigslist.org/search/apa?query=2%20bedroom&max_price=4500&min_bedrooms=2&postedToday=1" },
]

[[sources]]
name = "facebook"
type = "apify"
enabled = true
actor_id = "apify/facebook-marketplace-scraper"
max_items = 25

[sources.input]
startUrls = [
  { url = "https://www.facebook.com/marketplace/nyc/propertyrentals?maxPrice=4500&exact=false" },
]
resultsLimit = 25
includeListingDetails = false
